version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: titansearch-db
    ports:
      - "5439:5432"
    environment:
      POSTGRES_DB: titansearch
      POSTGRES_USER: titansearch
      POSTGRES_PASSWORD: titansearch
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U titansearch -d titansearch"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: titansearch-cache
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: ./titansearch-backend
    container_name: titansearch-backend
    ports:
      - "8080:8080"
    environment:
      - SPRING_PROFILES_ACTIVE=prod
      - DATABASE_URL=jdbc:postgresql://postgres:5432/titansearch
      - DATABASE_USERNAME=titansearch
      - DATABASE_PASSWORD=titansearch
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - GITHUB_TOKEN=${GITHUB_TOKEN}
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - JWT_SECRET=${JWT_SECRET:-change-me-in-prod-this-must-be-at-least-256-bits-long}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  frontend:
    build: ./titansearch-frontend
    container_name: titansearch-frontend
    ports:
      - "3000:80"
    depends_on:
      - backend

volumes:
  postgres_data:
