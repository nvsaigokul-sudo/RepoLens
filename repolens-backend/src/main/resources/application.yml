spring:
  application:
    name: repolens-backend
  profiles:
    active: dev
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
        default_batch_fetch_size: 20
  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration
  data:
    redis:
      host: ${REDIS_HOST:${SPRING_DATA_REDIS_HOST:localhost}}
      port: ${REDIS_PORT:${SPRING_DATA_REDIS_PORT:6379}}
      password: ${REDIS_PASSWORD:${SPRING_DATA_REDIS_PASSWORD:}}

server:
  port: 8080
  error:
    include-message: always
    include-binding-errors: always

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      probes:
        enabled: true
      show-details: when-authorized

titansearch:
  jwt:
    secret: ${JWT_SECRET:change-me-in-prod-this-must-be-at-least-256-bits-long}
    access-token-ttl-minutes: 15
    refresh-token-ttl-days: 7
  github:
    api-base-url: https://api.github.com
    token: ${GITHUB_TOKEN:}
  cache:
    search-ttl-seconds: 300
    detail-ttl-seconds: 900
  ai:
    gemini:
      api-key: ${GEMINI_API_KEY:}
      model: gemini-1.5-flash

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html

app:
  debug-mode: ${APP_DEBUG_MODE:false}
